version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18

  phases:
  build:
    commands:
      - echo "Installing dependencies..."
      - npm install
      - mkdir package
      - cp index.js package/
      - cp -r node_modules package/ || true
      - cd package
      - ls -la  
      - zip -r ../function.zip .
      - cd ..
      - unzip -l function.zip  

artifacts:
  files:
    - function.zip

    