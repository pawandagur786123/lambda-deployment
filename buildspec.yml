version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18

  build:
    commands:
      - echo "Installing dependencies..."
      - npm install
      - mkdir package
      - cp index.js package/
      - cp -r node_modules package/ || true
      - cd package
      - zip -r ../function.zip .

artifacts:
  files:
    - function.zip

    